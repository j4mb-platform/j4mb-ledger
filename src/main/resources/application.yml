spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: j4mb-ledger
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/j4mb_ledger}
    username: ${SPRING_DATASOURCE_USERNAME:j4mb}
    password: ${SPRING_DATASOURCE_PASSWORD:j4mb}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
  docker:
    compose:
      enabled: false

server:
  port: ${SPRING_BOOT_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
